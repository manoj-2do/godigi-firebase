<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Live Tracking</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --primary: #2563EB;
      --success: #22C55E;
      --danger: #EF4444;
      --text: #1E293B;
      --muted: #64748B;
      --bg: #F8FAFC;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #loader,
    #expired,
    #active {
      display: none;
      height: 100%;
      width: 100%;
    }

    #loader {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .spinner {
      border: 4px solid #E2E8F0;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    #expired {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    .expired-card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      max-width: 400px;
      width: 100%;
    }

    .expired-card svg {
      width: 64px;
      height: 64px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .expired-card h2 {
      margin-bottom: 8px;
      font-size: 20px;
    }

    .expired-card p {
      color: var(--muted);
    }

    #active {
      flex-direction: column;
      display: none;
    }

    #map-container {
      position: relative;
      height: 55vh;
      width: 100%;
    }

    #map {
      height: 100%;
      width: 100%;
      z-index: 1;
    }

    #map-container.arrived::after {
      content: '';
      position: absolute;
      inset: 0;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      background: rgba(255, 255, 255, 0.3);
      z-index: 2;
    }

    #arrived-banner {
      display: none;
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      background: var(--success);
      color: white;
      padding: 16px;
      border-radius: 12px;
      font-weight: 600;
      text-align: center;
      z-index: 400;
      animation: slideDown 0.3s ease-out;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    #info-card {
      height: 45vh;
      background: white;
      border-radius: 24px 24px 0 0;
      box-shadow: 0 -4px 20px rgb(0 0 0 / 0.05);
      padding: 24px;
      display: flex;
      flex-direction: column;
      z-index: 10;
      position: relative;
      margin-top: -20px;
      overflow-y: auto;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #EEF2FF;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 12px;
      align-self: flex-start;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4);
      }

      70% {
        box-shadow: 0 0 0 6px rgba(37, 99, 235, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(37, 99, 235, 0);
      }
    }

    h1 {
      font-size: 22px;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric-card {
      background: var(--bg);
      padding: 12px 16px;
      border-radius: 12px;
    }

    .metric-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 500;
    }

    .metric-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .icon-box {
      background: #FEF2F2;
      color: var(--danger);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .address-info h3 {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 2px;
    }

    .address-info p {
      font-size: 14px;
      font-weight: 600;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .driver-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 16px;
      padding-bottom: 24px;
      border-top: 1px solid #E2E8F0;
      margin-top: auto;
    }

    .avatar {
      width: 44px;
      height: 44px;
      background: var(--primary);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .driver-info h3 {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 2px;
    }

    .driver-info p {
      font-size: 16px;
      font-weight: 700;
    }

    .call-btn {
      margin-left: auto;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #DCFCE7;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .call-btn svg {
      width: 18px;
      height: 18px;
      color: #16A34A;
    }

    .countdown {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>

<body>

  <div id="loader" style="display: flex;">
    <div class="spinner"></div>
  </div>

  <div id="expired">
    <div class="expired-card">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
      </svg>
      <h2>Link expired</h2>
      <p>This tracking link has expired.</p>
    </div>
  </div>

  <div id="active">
    <div id="map-container">
      <div id="arrived-banner">Your driver has arrived at the pickup point</div>
      <div id="map"></div>
    </div>
    <div id="info-card">
      <div class="live-badge">
        <div class="dot"></div>Live tracking
      </div>
      <h1 id="headingText">Your driver is on the way</h1>
      <div class="grid">
        <div class="metric-card">
          <div class="metric-label">Pickup time</div>
          <div class="metric-value" id="pickup-time-val">--:--</div>
        </div>
      </div>
      <div class="row">
        <div class="icon-box">
          <svg style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </div>
        <div class="address-info">
          <h3>Pickup location</h3>
          <p id="address-val">Loading...</p>
        </div>
      </div>
      <div class="driver-row">
        <div class="avatar" id="avatar-val">N</div>
        <div class="driver-info">
          <h3>Driver</h3>
          <p id="driver-name-val">Loading...</p>
        </div>
        <a id="call-btn" class="call-btn" href="#">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="color:#16A34A;">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
          </svg>
        </a>
      </div>
      <div class="countdown" id="countdown-val"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, connectFirestoreEmulator, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDwOorr7BAOHrlnr5IF7S2gVM2BLpcjYcI",
      authDomain: "godigi-8af79.firebaseapp.com",
      projectId: "godigi-8af79",
      storageBucket: "godigi-8af79.firebasestorage.app",
      messagingSenderId: "1096637238495",
      appId: "1:1096637238495:web:cf32ee534692f83898ed6a",
      measurementId: "G-9LQP7K9NYD"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    /*
    * FIREBASE HOSTING: EMULATOR
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        connectFirestoreEmulator(db, 'localhost', 8080);
      }
    */

    const isDev = true;
    // window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    const log = (...args) => { if (isDev) console.log(...args); };
    const logErr = (...args) => { if (isDev) console.error(...args); };

    const parts = window.location.pathname.split('/').filter(Boolean);
    const token = parts.pop()?.replace(/[^a-zA-Z0-9-]/g, '');
    const jobId = parts.pop()?.replace(/[^a-zA-Z0-9-]/g, '');

    let map, driverMarker, pickupMarker, routeLine;
    let pickupLat, pickupLng;
    let unsubscribe = null;
    let initialised = false;
    let countdownInterval = null;
    let readCount = 0;

    // ── Helpers ───────────────────────────────────────────────────────────────

    function showState(state) {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('expired').style.display = 'none';
      document.getElementById('active').style.display = 'none';
      if (state === 'active') document.getElementById('active').style.display = 'flex';
      else document.getElementById(state).style.display = 'flex';
    }

    function shutdown(reason) {
      if (unsubscribe) {
        unsubscribe();
        unsubscribe = null;
        log(`🔌 Firestore listener detached | reason: ${reason} | total reads: ${readCount}`);
      }
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
      if (reason === 'arrived') {
        document.getElementById('map-container').classList.add('arrived');
        document.getElementById('arrived-banner').style.display = 'block';
        document.getElementById('headingText').style.display = 'block';
        document.getElementById('headingText').innerText = 'Driver arrived';

        // Only show live tracking badge if we have had a location ping
        const hasLoc = !isNaN(pickupLat) && !isNaN(pickupLng); // Assume arrived means they reached pickup
        if (hasLoc) {
          document.querySelector('.live-badge').style.display = 'inline-flex';
          document.querySelector('.live-badge').style.background = '#DCFCE7';
          document.querySelector('.live-badge').style.color = '#16A34A';
          document.querySelector('.dot').style.display = 'none';
        }
      } else {
        showState('expired');
      }
    }

    function setupUI(d) {
      pickupLat = parseFloat(d.pickup_lat ?? d.pickupLat);
      pickupLng = parseFloat(d.pickup_lng ?? d.pickupLng);

      document.getElementById('address-val').innerText = d.pick_up ?? d.pickupAddress ?? 'No address provided';

      const driverName = d.driver_name ?? d.driverName ?? 'Driver';
      document.getElementById('driver-name-val').innerText = driverName;
      document.getElementById('avatar-val').innerText = driverName.charAt(0).toUpperCase();

      const phone = d.driver_phone_number ?? d.driverPhoneNumber ?? '';
      const callBtn = document.getElementById('call-btn');
      if (phone) {
        callBtn.href = `tel:${phone}`;
      } else {
        callBtn.style.opacity = '0.4';
        callBtn.style.pointerEvents = 'none';
      }

      const pickupTime = d.pick_up_time ?? d.scheduledTime;
      if (pickupTime) {
        const t = pickupTime.toDate ? pickupTime.toDate() : new Date(pickupTime);
        document.getElementById('pickup-time-val').innerText = t.toLocaleString([], {
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
        });
      }

      const expiryField = d.token_expires_at ?? d.tokenExpiresAt;
      if (expiryField) {
        const expiresAt = expiryField.toDate();
        countdownInterval = setInterval(() => {
          const diff = expiresAt - new Date();
          if (diff <= 0) { window.location.reload(); return; }
          const h = Math.floor(diff / (1000 * 60 * 60));
          const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          document.getElementById('countdown-val').innerText = `Link expires in ${h}h ${m}m`;
        }, 1000);
      }
    }

    function makePickupIcon() {
      return L.divIcon({
        className: '',
        html: `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
          <div style="background:#1E293B;color:white;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.3);">Pickup point</div>
          <div style="width:16px;height:16px;background:#2563EB;border:2.5px solid white;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.35);"></div>
        </div>`,
        iconSize: [90, 42],
        iconAnchor: [45, 42],
      });
    }

    function makeDriverIcon() {
      return L.divIcon({
        className: '',
        html: `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
          <div style="background:#2563EB;color:white;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap;box-shadow:0 2px 6px rgba(37,99,235,0.4);">Driver</div>
          <div style="width:22px;height:22px;background:#2563EB;border:3px solid white;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>
        </div>`,
        iconSize: [90, 48],
        iconAnchor: [45, 48],
      });
    }

    // ── Map ───────────────────────────────────────────────────────────────────

    function initMap(driverLat, driverLng) {
      map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        minZoom: 12,
        maxZoom: 18,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        touchZoom: false,
        dragging: true,
      });

      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
      }).addTo(map);

      // Zoom controls — top right, + active, − greys out at minZoom
      const ZoomControl = L.Control.extend({
        onAdd() {
          const wrap = L.DomUtil.create('div');
          wrap.style.cssText = 'display:flex;flex-direction:column;gap:4px;margin:10px;';

          const btnIn = L.DomUtil.create('button', '', wrap);
          btnIn.innerHTML = '+';
          btnIn.style.cssText = 'width:36px;height:36px;background:white;border:none;border-radius:8px;font-size:20px;font-weight:500;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.2);color:#1E293B;line-height:1;';
          L.DomEvent.on(btnIn, 'click', (e) => { L.DomEvent.stopPropagation(e); map.zoomIn(); });

          const btnOut = L.DomUtil.create('button', '', wrap);
          btnOut.innerHTML = '−';
          btnOut.style.cssText = 'width:36px;height:36px;background:white;border:none;border-radius:8px;font-size:20px;font-weight:500;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.2);color:#1E293B;line-height:1;';

          const updateOutBtn = () => {
            const atMin = map.getZoom() <= map.getMinZoom();
            btnOut.style.background = atMin ? '#F1F5F9' : 'white';
            btnOut.style.color = atMin ? '#CBD5E1' : '#1E293B';
            btnOut.style.cursor = atMin ? 'not-allowed' : 'pointer';
          };

          L.DomEvent.on(btnOut, 'click', (e) => {
            L.DomEvent.stopPropagation(e);
            if (map.getZoom() > map.getMinZoom()) map.zoomOut();
          });

          map.on('zoomend', updateOutBtn);
          setTimeout(updateOutBtn, 0);

          return wrap;
        }
      });
      new ZoomControl({ position: 'topright' }).addTo(map);

      pickupMarker = L.marker([pickupLat, pickupLng], { icon: makePickupIcon() }).addTo(map);

      if (!isNaN(driverLat) && !isNaN(driverLng)) {
        driverMarker = L.marker([driverLat, driverLng], { icon: makeDriverIcon(), zIndexOffset: 1000 }).addTo(map);
        map.fitBounds(L.latLngBounds([[driverLat, driverLng], [pickupLat, pickupLng]]), { padding: [60, 60], maxZoom: 30 });
        drawRoute(driverLat, driverLng);
      } else {
        map.setView([pickupLat, pickupLng], 14);
      }

      setTimeout(() => map.invalidateSize(), 100);
    }

    function updateDriverLocation(lat, lng) {
      if (!driverMarker) {
        driverMarker = L.marker([lat, lng], { icon: makeDriverIcon(), zIndexOffset: 1000 }).addTo(map);
        map.fitBounds(L.latLngBounds([[lat, lng], [pickupLat, pickupLng]]), { padding: [60, 60], maxZoom: 15 });
      } else {
        driverMarker.setLatLng([lat, lng]);
      }
      drawRoute(lat, lng);
    }

    async function drawRoute(lat, lng) {
      try {
        const url = `https://router.project-osrm.org/route/v1/driving/${lng},${lat};${pickupLng},${pickupLat}?overview=full&geometries=geojson`;
        const res = await fetch(url);
        const data = await res.json();
        if (!data.routes?.length) return;

        const coords = data.routes[0].geometry.coordinates.map(([lo, la]) => [la, lo]);
        const duration = Math.round(data.routes[0].duration / 60);
        const distance = (data.routes[0].distance / 1000).toFixed(1);

        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.polyline(coords, { color: '#2563EB', weight: 5, opacity: 0.85 }).addTo(map);
        routeLine.bringToBack();
      } catch (e) {
        console.error('OSRM routing error', e);
      }
    }

    // ── Entry point ───────────────────────────────────────────────────────────

    function init() {
      if (!token || !jobId) { showState('expired'); return; }

      unsubscribe = onSnapshot(
        doc(db, 'trip_tracking', jobId),
        (snap) => {
          readCount++;
          log(`📡 Firestore read #${readCount} | exists: ${snap.exists()} | jobId: ${jobId}`);
          if (!snap.exists()) { shutdown('expired'); return; }
          const d = snap.data();
          log(`   status: ${d.status} | lat: ${d.last_latitude ?? d.latitude} | lng: ${d.last_longitude ?? d.longitude} | initialised: ${initialised}`);

          if (!initialised) {
            const storedToken = d.token ?? d.tracking_token;
            if (storedToken !== token) { shutdown('expired'); return; }

            const expiryField = d.token_expires_at ?? d.tokenExpiresAt;
            if (expiryField && expiryField.toDate() < new Date()) { shutdown('expired'); return; }

            setupUI(d);
            initialised = true;

            // Driver already at pickup when page was opened
            if (d.status === 'HEADING TO DROP' || d.status === 'TRIP COMPLETED') {
              showState('active');

              const driverLat = parseFloat(d.last_latitude ?? d.latitude);
              const driverLng = parseFloat(d.last_longitude ?? d.longitude);
              const hasLoc = !isNaN(driverLat) && !isNaN(driverLng);

              if (hasLoc) {
                document.getElementById('headingText').style.display = 'block';
                document.querySelector('.live-badge').style.display = 'inline-flex';
              } else {
                document.getElementById('headingText').style.display = 'block';
                document.getElementById('headingText').innerText = 'Pickup not started';
                document.querySelector('.live-badge').style.display = 'none';
              }

              requestAnimationFrame(() => { initMap(driverLat, driverLng); shutdown('arrived'); });
              return;
            }

            showState('active');
            let driverLat = NaN;
            let driverLng = NaN;
            if (d.status === 'HEADING TO PICKUP') {
              driverLat = parseFloat(d.last_latitude ?? d.latitude);
              driverLng = parseFloat(d.last_longitude ?? d.longitude);
              const hasLoc = !isNaN(driverLat) && !isNaN(driverLng);

              if (hasLoc) {
                document.getElementById('headingText').style.display = 'block';
                document.getElementById('headingText').innerText = 'Your driver is on the way';
                document.querySelector('.live-badge').style.display = 'inline-flex';
              } else {
                document.getElementById('headingText').style.display = 'block';
                document.getElementById('headingText').innerText = 'Pickup not started';
                document.querySelector('.live-badge').style.display = 'none';
              }
            } else {
              document.getElementById('headingText').style.display = 'block';
              document.getElementById('headingText').innerText = 'Pickup not started';
              document.querySelector('.live-badge').style.display = 'none';
            }
            requestAnimationFrame(() => initMap(driverLat, driverLng));
            return;
          }

          // Subsequent emissions — update location
          if (d.status === 'HEADING TO PICKUP') {
            const lat = parseFloat(d.last_latitude ?? d.latitude);
            const lng = parseFloat(d.last_longitude ?? d.longitude);
            const hasLoc = !isNaN(lat) && !isNaN(lng);

            if (hasLoc) {
              document.getElementById('headingText').style.display = 'block';
              document.getElementById('headingText').innerText = 'Your driver is on the way';
              document.querySelector('.live-badge').style.display = 'inline-flex';
              updateDriverLocation(lat, lng);
            } else {
              document.getElementById('headingText').style.display = 'block';
              document.getElementById('headingText').innerText = 'Pickup not started';
              document.querySelector('.live-badge').style.display = 'none';
            }
          }

          if (d.status === 'HEADING TO DROP' || d.status === 'TRIP COMPLETED') shutdown('arrived');
        },
        (error) => {
          logErr('❌ Firestore listener error', error);
          shutdown('expired');
        }
      );
      log(`✅ Firestore listener attached | jobId: ${jobId}`);
    }

    window.onload = init;
  </script>
</body>

</html>
