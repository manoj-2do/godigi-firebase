<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Live Tracking</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --primary: #2563EB;
      --success: #22C55E;
      --danger:  #EF4444;
      --text:    #1E293B;
      --muted:   #64748B;
      --bg:      #F8FAFC;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

    body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    #loader, #expired, #not-found, #active { display: none; height: 100%; width: 100%; }
    #loader.visible    { display: flex; align-items: center; justify-content: center; flex-direction: column; }
    #expired.visible   { display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }
    #not-found.visible { display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }
    #active.visible    { display: flex; flex-direction: column; }

    .spinner { border: 4px solid #E2E8F0; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .expired-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); max-width: 400px; width: 100%; }
    .expired-card svg { width: 64px; height: 64px; color: var(--muted); margin-bottom: 16px; }
    .expired-card h2 { margin-bottom: 8px; font-size: 20px; }
    .expired-card p { color: var(--muted); }

    #map-container { position: relative; height: 55vh; width: 100%; }
    #map { height: 100%; width: 100%; z-index: 1; }
    #map-container.arrived::after { content: ''; position: absolute; inset: 0; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); background: rgba(255,255,255,0.3); z-index: 2; }

    #arrived-banner { display: none; position: absolute; top: 20px; left: 20px; right: 20px; background: var(--success); color: white; padding: 16px; border-radius: 12px; font-weight: 600; text-align: center; z-index: 400; animation: slideDown 0.3s ease-out; }
    @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    #info-card { height: 45vh; background: white; border-radius: 24px 24px 0 0; box-shadow: 0 -4px 20px rgb(0 0 0 / 0.05); padding: 24px; display: flex; flex-direction: column; z-index: 10; position: relative; margin-top: -20px; overflow-y: auto; }

    .live-badge { display: inline-flex; align-items: center; gap: 8px; background: #EEF2FF; padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 12px; align-self: flex-start; }
    .dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37,99,235,0.4); } 70% { box-shadow: 0 0 0 6px rgba(37,99,235,0); } 100% { box-shadow: 0 0 0 0 rgba(37,99,235,0); } }

    h1 { font-size: 22px; margin-bottom: 16px; }

    .grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 16px; }
    .metric-card { background: var(--bg); padding: 12px 16px; border-radius: 12px; }
    .metric-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
    .metric-value { font-size: 16px; font-weight: 700; color: var(--text); }

    .row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
    .icon-box { background: #FEF2F2; color: var(--danger); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .address-info h3 { font-size: 12px; color: var(--muted); font-weight: 500; margin-bottom: 2px; }
    .address-info p { font-size: 14px; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .driver-row { display: flex; align-items: center; gap: 12px; padding-top: 16px; padding-bottom: 24px; border-top: 1px solid #E2E8F0; margin-top: auto; }
    .avatar { width: 44px; height: 44px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; flex-shrink: 0; }
    .driver-info h3 { font-size: 12px; color: var(--muted); font-weight: 500; margin-bottom: 2px; }
    .driver-info p { font-size: 16px; font-weight: 700; }
    .call-btn { margin-left: auto; width: 40px; height: 40px; border-radius: 50%; background: #DCFCE7; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    .countdown { font-size: 12px; color: var(--muted); text-align: center; margin-top: 12px; }
  </style>
  <script type="module" crossorigin src="/assets/index-BsqGUY0O.js"></script>
</head>
<body>

  <div id="loader"><div class="spinner"></div></div>

  <div id="not-found">
    <div class="expired-card">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <h2>404 — Not Found</h2>
      <p>This tracking link does not exist.</p>
    </div>
  </div>

  <div id="expired">
    <div class="expired-card">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
      </svg>
      <h2>Link expired</h2>
      <p>This tracking link has expired.</p>
    </div>
  </div>

  <div id="active">
    <div id="map-container">
      <div id="arrived-banner">Your driver has arrived at the pickup point</div>
      <div id="map"></div>
    </div>
    <div id="info-card">
      <div class="live-badge"><div class="dot"></div>Live tracking</div>
      <h1 id="headingText">Your driver is on the way</h1>
      <div class="grid">
        <div class="metric-card">
          <div class="metric-label">Pickup time</div>
          <div class="metric-value" id="pickup-time-val">--:--</div>
        </div>
      </div>
      <div class="row">
        <div class="icon-box">
          <svg style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </div>
        <div class="address-info">
          <h3>Pickup location</h3>
          <p id="address-val">Loading...</p>
        </div>
      </div>
      <div class="driver-row">
        <div class="avatar" id="avatar-val">N</div>
        <div class="driver-info">
          <h3>Driver</h3>
          <p id="driver-name-val">Loading...</p>
        </div>
        <a id="call-btn" class="call-btn" href="#">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="color:#16A34A;width:18px;height:18px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
          </svg>
        </a>
      </div>
      <div class="countdown" id="countdown-val"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
